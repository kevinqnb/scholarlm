# ScholarlM experiment configuration
#
# This file is the single source of truth for stable experiment parameters:
# seeds, per-model sampling params, HuggingFace revision SHAs, serve
# settings, and cluster scheduler settings.  It is committed to the repo so
# any result is traceable to the exact parameters in effect at the time of
# the run (via git history).
#
# Run `python experiments/gen_serve_script.py` to regenerate serve scripts
# from this file whenever the serve section of any model changes.
#
# Personal paths are NOT stored here.  Set the following environment
# variables in your cluster profile or a local .env file:
#
#   VLLM_SIF_DIR        - directory containing Singularity .sif images
#                         (the sif_image field below is the filename within it)
#   HF_CACHE            - HuggingFace weights cache directory
#   SINGULARITY_BIND    - bind-mount path argument for singularity exec
#   SCHOLARLM_ROOT      - absolute path to this repository root
#   TMPDIR              - temporary directory for Singularity jobs
#   SGE_PROJECT         - SGE project allocation name for the -P directive

defaults:
  seed: 342
  max_concurrent: 64

cluster:
  sge_mail_events: e           # SGE mail triggers: b=begin, e=end, a=abort
  # sge_project is read from the SGE_PROJECT environment variable; do not set it here.

models:
  llama-3.1-8b:
    model_id: meta-llama/Llama-3.1-8B-Instruct
    # Pin to a specific HuggingFace commit for reproducibility.
    # Run: huggingface-cli download meta-llama/Llama-3.1-8B-Instruct --revision main
    # and record the resolved commit SHA here.
    hf_revision: null
    sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      max_tokens: 8192
      seed: 342
      enable_thinking: false
    serve:
      port: 8081
      max_model_len: 90000
      gpu_memory_utilization: 0.90
      quantization: null
      dtype: bfloat16
      sif_image: vllm-openai_v0.19.0.sif
      # SGE resource requests
      gpu_memory: 32G
      gpu_capability: 7.0
      walltime: "48:00:00"
      omp: 8

